<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawaw Comic Reader</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
            font-family: Arial, sans-serif;
        }
        h1 {
            /* Animated gradient text */
            background: linear-gradient(45deg, #ff6f20, #ffcc30);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 5s infinite;
            font-size: 3em;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .comic-container {
            perspective: 1000px;
        }
        .comic {
            width: 300px;
            height: 400px;
            position: relative;
            transition: transform 0.5s;
        }
        .comic:hover {
            transform: rotateY(15deg);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            width: 80%;
            height: 80%;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="comic-container">
        <h1>Welcome to Pawaw Comic Reader</h1>
        <div class="comic" onclick="openModal()">
            <!-- Comic book content would go here -->
        </div>
    </div>
    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content">
            <!-- GLB Model Viewer Placeholder -->
            <model-viewer src="path/to/character.glb" alt="Character" auto-rotate camera-controls></model-viewer>
        </div>
    </div>
    <script src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script>
        function openModal() {
            document.getElementById('modal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
