<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAWAW - Comic Ebook Reader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: 'Georgia', serif;
            color: #ffffff;
            overflow-x: hidden;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #000000 100%);
        }

        /* ==================== HEADER ==================== */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(0,0,0,0.9), rgba(20,0,40,0.8));
            border-bottom: 3px solid;
            border-image: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff, #06ffa5, #ffbe0b) 1;
            box-shadow: 0 10px 40px rgba(255, 0, 110, 0.3);
            position: relative;
            z-index: 50;
        }

        h1 {
            font-size: 4em;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff, #06ffa5, #ffbe0b, #ff006e);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textGlow 8s ease infinite;
            text-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
        }

        .subtitle {
            font-size: 1.3em;
            margin-top: 10px;
            background: linear-gradient(90deg, #06ffa5, #3a86ff, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        @keyframes textGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 0, 110, 0.5)); }
            50% { filter: drop-shadow(0 0 25px rgba(131, 56, 236, 0.8)); }
        }

        /* ==================== NAVIGATION MENU ==================== */
        nav.top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: linear-gradient(90deg, rgba(0,0,0,0.95), rgba(20,0,40,0.9));
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #d4af37, #c9a961, #d4af37) 1;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.2);
            position: relative;
            z-index: 100;
            flex-wrap: wrap;
            gap: 20px;
        }

        .nav-brand {
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(90deg, #d4af37, #ffbe0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-menu a, .nav-menu button {
            color: #06ffa5;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1em;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-menu a:hover, .nav-menu button:hover {
            color: #ffbe0b;
            text-shadow: 0 0 10px rgba(255, 190, 11, 0.6);
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ff006e, #8338ec);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .auth-buttons {
            display: flex;
            gap: 15px;
        }

        .auth-btn {
            padding: 8px 20px;
            border: 2px solid;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn {
            border-color: #06ffa5;
            color: #06ffa5;
            background: transparent;
        }

        .login-btn:hover {
            background: rgba(6, 255, 165, 0.1);
            box-shadow: 0 0 15px rgba(6, 255, 165, 0.4);
        }

        .signup-btn {
            border-color: #ff006e;
            color: #ffffff;
            background: linear-gradient(135deg, #ff006e, #8338ec);
        }

        .signup-btn:hover {
            box-shadow: 0 0 20px rgba(255, 0, 110, 0.6);
            transform: translateY(-2px);
        }

        /* ==================== CHARACTER SELECTOR ==================== */
        .character-selector {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 15px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(131, 56, 236, 0.1));
            border: 2px solid #d4af37;
            border-radius: 10px;
            margin-top: 15px;
            width: 100%;
            flex-wrap: wrap;
        }

        .character-selector label {
            color: #ffbe0b;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .char-btn {
            padding: 10px 20px;
            border: 2px solid;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .char-btn.tox {
            border-color: #ff006e;
            color: #ff006e;
            background: transparent;
        }

        .char-btn.tox:hover {
            background: rgba(255, 0, 110, 0.2);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
        }

        .char-btn.tox.active {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
        }

        .char-btn.zex {
            border-color: #06ffa5;
            color: #06ffa5;
            background: transparent;
        }

        .char-btn.zex:hover {
            background: rgba(6, 255, 165, 0.2);
            box-shadow: 0 0 15px rgba(6, 255, 165, 0.4);
        }

        .char-btn.zex.active {
            background: linear-gradient(135deg, #06ffa5, #3a86ff);
            color: white;
        }

        .char-preview {
            width: 100px;
            height: 100px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .char-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ==================== MAIN CONTAINER ==================== */
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 300px);
            padding: 40px 20px;
            perspective: 1200px;
            position: relative;
        }

        /* ==================== 3D BOOK WITH DIAGONAL VIEW ==================== */
        .book-wrapper {
            position: relative;
            width: 100%;
            max-width: 1100px;
            height: 700px;
            perspective: 1500px;
            transform-style: preserve-3d;
            transform: rotateX(10deg) rotateY(-30deg) rotateZ(5deg);
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .book-wrapper:hover {
            transform: rotateX(8deg) rotateY(-35deg) rotateZ(3deg);
        }

        .book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .book:hover {
            transform: rotateY(-5deg) rotateX(2deg);
        }

        /* ==================== BOOK BINDING (MECHANICAL GOLD/SILVER) ==================== */
        .book-binding {
            position: absolute;
            left: 48%;
            top: 0;
            width: 60px;
            height: 100%;
            background: linear-gradient(90deg, 
                #d4af37 0%, 
                #e8dcc8 20%, 
                #f5f1e8 35%,
                #c0c0c0 50%,
                #a9a9a9 65%,
                #e8dcc8 80%,
                #d4af37 100%);
            transform: translateX(-50%) translateZ(50px);
            border-left: 3px solid rgba(255, 255, 255, 0.5);
            border-right: 3px solid rgba(0, 0, 0, 0.5);
            box-shadow: 
                inset -8px 0 20px rgba(0, 0, 0, 0.6),
                inset 8px 0 20px rgba(255, 255, 255, 0.3),
                0 0 40px rgba(212, 175, 55, 0.4),
                0 20px 40px rgba(0, 0, 0, 0.8);
            z-index: 150;
        }

        .book-binding::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 10px,
                    rgba(212, 175, 55, 0.3) 10px,
                    rgba(212, 175, 55, 0.3) 20px
                ),
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 10px,
                    rgba(192, 192, 192, 0.3) 10px,
                    rgba(192, 192, 192, 0.3) 20px
                );
            z-index: 2;
        }

        .book-binding::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            height: 60%;
            background: 
                radial-gradient(ellipse 100px 30px at 50% 30%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(ellipse 100px 30px at 50% 70%, rgba(0, 0, 0, 0.2), transparent);
            border: 2px wavy rgba(212, 175, 55, 0.6);
            border-radius: 50%;
            z-index: 1;
            filter: blur(2px);
        }

        /* 3D LINES FOR DIAGONAL BOOK EFFECT */
        .book-3d-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 140;
            pointer-events: none;
        }

        .cubic-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.4), transparent);
        }

        .line-top {
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            transform: skewY(-5deg);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .line-bottom {
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            transform: skewY(5deg);
            box-shadow: 0 -5px 15px rgba(212, 175, 55, 0.3);
        }

        .line-left {
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            transform: skewX(-5deg);
            background: linear-gradient(180deg, transparent, rgba(212, 175, 55, 0.4), transparent);
            box-shadow: 5px 0 15px rgba(212, 175, 55, 0.3);
        }

        .line-right {
            top: 0;
            right: 0;
            width: 3px;
            height: 100%;
            transform: skewX(5deg);
            background: linear-gradient(180deg, transparent, rgba(212, 175, 55, 0.4), transparent);
            box-shadow: -5px 0 15px rgba(212, 175, 55, 0.3);
        }

        /* ==================== BOOK SPINE ==================== */
        .book-spine {
            position: absolute;
            left: 50%;
            top: 0;
            width: 30px;
            height: 100%;
            background: linear-gradient(90deg, #1a0a1a 0%, #2d0a2d 50%, #1a0a1a 100%);
            transform: translateX(-50%) translateZ(0);
            border-left: 2px solid rgba(255, 0, 110, 0.6);
            border-right: 2px solid rgba(131, 56, 236, 0.6);
            box-shadow: 
                inset -5px 0 15px rgba(0, 0, 0, 0.8),
                inset 5px 0 15px rgba(131, 56, 236, 0.3),
                0 0 30px rgba(255, 0, 110, 0.2);
            z-index: 100;
        }

        .book-spine::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 20%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 110, 0.5), transparent);
            z-index: 2;
        }

        /* ==================== LEFT PAGE ==================== */
        .page-left {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #f5f1e8 0%, #e8dcc8 100%);
            border: 4px solid;
            border-image: linear-gradient(135deg, #d4af37, #c9a961, #b8860b) 1;
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.1),
                0 0 30px rgba(212, 175, 55, 0.3);
            transform-style: preserve-3d;
            transform: rotateY(0deg);
            transform-origin: right center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 30px;
            gap: 20px;
        }

        .page-left::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.02) 2px,
                rgba(0, 0, 0, 0.02) 4px
            );
            pointer-events: none;
            z-index: 5;
        }

        /* ==================== RIGHT PAGE ==================== */
        .page-right {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #e8dcc8 0%, #f5f1e8 100%);
            border: 4px solid;
            border-image: linear-gradient(135deg, #b8860b, #c9a961, #d4af37) 1;
            box-shadow: 
                inset 0 0 30px rgba(0, 0, 0, 0.1),
                0 0 30px rgba(212, 175, 55, 0.3);
            transform-style: preserve-3d;
            transform: rotateY(0deg);
            transform-origin: left center;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 30px;
            gap: 20px;
        }

        .page-right::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.02) 2px,
                rgba(0, 0, 0, 0.02) 4px
            );
            pointer-events: none;
            z-index: 5;
        }

        /* ==================== PAGE CONTENT ==================== */
        .page-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            height: 100%;
            position: relative;
            z-index: 3;
        }

        .page-title {
            grid-column: 1 / -1;
            font-size: 1.5em;
            font-weight: bold;
            color: #2c1810;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid #d4af37;
            padding-bottom: 10px;
        }

        /* ==================== COMIC CASES (PANELS) ==================== */
        .comic-case {
            position: relative;
            background: linear-gradient(135deg, #ffffff 0%, #f9f6f0 100%);
            border: 3px solid #000000;
            border-radius: 2px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 
                0 5px 15px rgba(0, 0, 0, 0.3),
                inset 0 0 10px rgba(212, 175, 55, 0.2);
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1);
        }

        .comic-case:hover {
            transform: perspective(1000px) rotateX(5deg) rotateY(-5deg) scale(1.02);
            box-shadow: 
                0 10px 25px rgba(0, 0, 0, 0.4),
                inset 0 0 20px rgba(212, 175, 55, 0.4),
                0 0 20px rgba(131, 56, 236, 0.3);
        }

        .comic-case:active {
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(0.98);
        }

        .comic-case img,
        .comic-case video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: brightness(0.98) contrast(1.05);
            transition: filter 0.3s ease;
        }

        .comic-case:hover img,
        .comic-case:hover video {
            filter: brightness(1.05) contrast(1.15) saturate(1.1);
        }

        .case-number {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8em;
            box-shadow: 0 0 10px rgba(255, 0, 110, 0.6);
            z-index: 10;
        }

        /* ==================== OVERLAY CONTROLS (SUPERPOSED) ==================== */
        .overlay-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(20, 0, 40, 0.7));
            border-radius: 10px;
            border: 2px solid;
            border-image: linear-gradient(90deg, #d4af37, #ffbe0b) 1;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            z-index: 120;
            backdrop-filter: blur(10px);
        }

        .overlay-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
            border: 2px solid #06ffa5;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .overlay-btn:hover {
            background: linear-gradient(135deg, #8338ec, #3a86ff);
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(58, 134, 255, 0.6);
        }

        .overlay-btn:active {
            transform: translateY(-1px);
        }

        .overlay-indicator {
            font-size: 1em;
            color: #06ffa5;
            text-shadow: 0 0 10px rgba(6, 255, 165, 0.5);
            font-weight: bold;
        }

        /* ==================== CONTROLS (BELOW BOOK) ==================== */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.05), rgba(131, 56, 236, 0.05));
            border-radius: 10px;
            border: 2px solid;
            border-image: linear-gradient(90deg, #ff006e, #8338ec, #3a86ff) 1;
        }

        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
            border: 2px solid #06ffa5;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: linear-gradient(135deg, #8338ec, #3a86ff);
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(58, 134, 255, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .page-indicator {
            font-size: 1.1em;
            color: #06ffa5;
            text-shadow: 0 0 10px rgba(6, 255, 165, 0.5);
        }

        /* ==================== FULLSCREEN ZOOM MODAL ==================== */
        .zoom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .zoom-modal.active {
            display: flex;
            opacity: 1;
        }

        .zoom-modal-content {
            position: relative;
            width: 95%;
            height: 95%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .zoom-modal img,
        .zoom-modal video {
            max-width: 100%;
            max-height: 80%;
            object-fit: contain;
            border: 6px solid;
            border-image: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff, #06ffa5, #ffbe0b) 1;
            box-shadow: 
                0 0 50px rgba(255, 0, 110, 0.8),
                0 0 100px rgba(131, 56, 236, 0.6),
                inset 0 0 50px rgba(6, 255, 165, 0.2);
            animation: zoomInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .zoom-dialogue {
            margin-top: 20px;
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #d4af37;
            border-radius: 10px;
            color: #06ffa5;
            max-width: 90%;
            text-align: center;
            font-size: 1.1em;
            line-height: 1.6;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        @keyframes zoomInScale {
            from {
                transform: scale(0.3) rotateY(45deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotateY(0deg);
                opacity: 1;
            }
        }

        /* ==================== CLOSE BUTTON ==================== */
        .close-zoom-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: 3px solid #06ffa5;
            border-radius: 50%;
            color: white;
            font-size: 2.5em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.7);
            z-index: 2001;
            font-weight: bold;
        }

        .close-zoom-btn:hover {
            background: linear-gradient(135deg, #8338ec, #3a86ff);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 50px rgba(58, 134, 255, 0.9);
        }

        .close-zoom-btn:active {
            transform: scale(0.95);
        }

        /* ==================== INFO SECTION ==================== */
        .info-section {
            text-align: center;
            padding: 40px 20px;
            max-width: 900*
