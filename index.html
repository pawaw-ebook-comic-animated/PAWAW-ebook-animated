<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Book Landing Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        h1 {
            background: linear-gradient(90deg, #ff6978, #ff9a00, #80ff72, #00a6ff, #a184e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 5s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
        }
        .panel {
            width: 100%;
            height: 300px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .panel:hover {
            transform: scale(1.05);
        }
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Comic Book</h1>
    </header>
    <div class="container">
        <div class="panel" id="panel1"><img src="comic-page1.jpg" alt="Comic Page 1"></div>
        <div class="panel" id="panel2"><img src="comic-page2.jpg" alt="Comic Page 2"></div>
        <!-- Add more panels as needed -->
    </div>
    <div class="lightbox" id="lightbox">
        <img id="lightbox-img" src="" alt="Zoomed Image">
    </div>
    <script>
        const panels = document.querySelectorAll('.panel');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        panels.forEach(panel => {
            panel.addEventListener('click', () => {
                lightboxImg.src = panel.querySelector('img').src;
                lightbox.style.display = 'flex';
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.style.display = 'none';
        });
    </script>
</body>
</html>
