    body {
        background: #000;
        font-family: 'Cinzel', 'Georgia', serif;
        overflow: hidden;
        color: #d4af37;
        position: relative;
        height: 100vh;
    }

    /* Particules magiques */
    .magic-particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: radial-gradient(circle, #d4af37, transparent);
        border-radius: 50%;
        animation: float 8s infinite;
        opacity: 0.6;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
    }

    /* Container principal */
    .grimoire-container {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        perspective: 2000px;
        z-index: 2;
    }

    /* Sélection de personnage */
    .character-selector {
        position: fixed;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .character-selector.left {
        left: 20px;
    }

    .character-selector.right {
        right: 20px;
    }

    .character-btn {
        width: 80px;
        height: 80px;
        border: 3px solid #d4af37;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.8);
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
    }

    .character-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
    }

    .character-btn.selected {
        border-color: #ffeb3b;
        box-shadow: 0 0 40px rgba(255, 235, 59, 0.8);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 40px rgba(255, 235, 59, 0.8); }
        50% { box-shadow: 0 0 60px rgba(255, 235, 59, 1); }
    }

    .character-label {
        position: absolute;
        bottom: -25px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        color: #d4af37;
        white-space: nowrap;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.8);
    }

    /* Le livre */
    .book {
        position: relative;
        width: min(800px, 90vw);
        height: min(600px, 70vh);
        transform-style: preserve-3d;
        transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    .book.open {
        transform: rotateY(-15deg);
    }

    .book-cover,
    .book-page {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1a0f0a 0%, #2d1810 100%);
        border: 4px solid #d4af37;
        box-shadow: 
            inset 0 0 50px rgba(0, 0, 0, 0.8),
            0 10px 50px rgba(0, 0, 0, 0.9);
        transform-style: preserve-3d;
        backface-visibility: hidden;
    }

    .book-cover {
        background: 
            linear-gradient(135deg, #1a0f0a 0%, #2d1810 100%),
            repeating-linear-gradient(
                90deg,
                transparent,
                transparent 2px,
                rgba(212, 175, 55, 0.1) 2px,
                rgba(212, 175, 55, 0.1) 4px
            );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.5s ease;
    }

    .book-cover:hover {
        box-shadow: 
            inset 0 0 50px rgba(0, 0, 0, 0.8),
            0 10px 80px rgba(212, 175, 55, 0.4);
    }

    .book-title {
        font-size: min(60px, 8vw);
        font-weight: bold;
        color: #d4af37;
        text-shadow: 
            0 0 20px rgba(212, 175, 55, 0.8),
            0 0 40px rgba(212, 175, 55, 0.5);
        margin-bottom: 20px;
        letter-spacing: 4px;
    }

    .book-subtitle {
        font-size: min(24px, 3vw);
        color: #b8945e;
        font-style: italic;
        text-shadow: 0 0 10px rgba(184, 148, 94, 0.6);
    }

    /* Pages du livre */
    .book-page {
        display: none;
        padding: 40px;
        overflow: hidden;
    }

    .book-page.active {
        display: block;
    }

    .page-content {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        overflow-y: auto;
        padding: 10px;
    }

    /* Cases de BD */
    .comic-panel {
        position: relative;
        aspect-ratio: 1;
        border: 3px solid #d4af37;
        background: #000;
        cursor: pointer;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    .comic-panel:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.6);
        border-color: #ffeb3b;
    }

    .comic-panel img,
    .comic-panel video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .comic-panel canvas {
        width: 100%;
        height: 100%;
    }

    .panel-number {
        position: absolute;
        top: 10px;
        left: 10px;
        background: rgba(212, 175, 55, 0.9);
        color: #000;
        padding: 5px 10px;
        border-radius: 5px;
        font-weight: bold;
        font-size: 14px;
        z-index: 2;
    }

    /* Fullscreen viewer */
    .fullscreen-viewer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
    }

    .fullscreen-viewer.active {
        display: flex;
    }

    .fullscreen-content {
        max-width: 90vw;
        max-height: 90vh;
        position: relative;
    }

    .fullscreen-content img,
    .fullscreen-content video {
        max-width: 100%;
        max-height: 90vh;
        object-fit: contain;
    }

    .fullscreen-content canvas {
        width: 90vw !important;
        height: 90vh !important;
    }

    .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        background: rgba(212, 175, 55, 0.9);
        border: none;
        border-radius: 50%;
        color: #000;
        font-size: 24px;
        cursor: pointer;
        z-index: 1001;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
    }

    .close-btn:hover {
        background: #ffeb3b;
        transform: scale(1.1);
    }

    /* Navigation */
    .nav-buttons {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 20px;
        z-index: 100;
    }

    .nav-btn {
        padding: 15px 30px;
        background: rgba(212, 175, 55, 0.2);
        border: 2px solid #d4af37;
        color: #d4af37;
        font-size: 18px;
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.3s ease;
        font-family: 'Cinzel', Georgia, serif;
        text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }

    .nav-btn:hover {
        background: rgba(212, 175, 55, 0.4);
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
    }

    .nav-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
    }

    /* Loading pour GLB */
    .loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #d4af37;
        font-size: 14px;
        text-align: center;
    }

    .spinner {
        border: 3px solid rgba(212, 175, 55, 0.3);
        border-top: 3px solid #d4af37;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .character-selector {
            width: 60px;
        }
        .character-btn {
            width: 60px;
            height: 60px;
        }
        .book-page {
            padding: 20px;
        }
        .page-content {
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
    }

        { type: 'glb', cid: 'bafybeibyrhc7icduc4rqr5ewt2w7ctomrnt45ct27yng23kvvbvuf3zkke' },
        { type: 'glb', cid: 'bafybeif4qod2d5h3ogqlxvqk6iadzt47msqb7onnwmzjkochgt4wcdj7bu' },
        { type: 'glb', cid: 'bafybeiabhfic2toqdovjym5jpp35yixw33jmn3m4ufvcf4nwuy2jtqs234' }
    ];

    // Personnages
    const characters = {
        tox: 'bafybeicx3z7yyyiaaghf36r2b4qctnmizfgpyixdx3mcsyicutq5r4nzem',
        zex: 'bafybeif5kms73p3chpfsfukdzcvzyesxn6qe4meafruvabwolyuow4texy'
    };

    let selectedCharacter = null;
    let currentPage = 0;
    let bookOpen = false;

    // Génération de particules magiques
    function createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
            container.appendChild(particle);
        }
    }

    // Sélection de personnage
    function setupCharacterSelection() {
        const toxBtn = document.getElementById('tox-btn');
        const zexBtn = document.getElementById('zex-btn');

        // Load character previews
        loadCharacterPreview('tox', toxBtn);
        loadCharacterPreview('zex', zexBtn);

        toxBtn.addEventListener('click', () => selectCharacter('tox', toxBtn, zexBtn));
        zexBtn.addEventListener('click', () => selectCharacter('zex', zexBtn, toxBtn));
    }

    function loadCharacterPreview(character, btn) {
        const cid = characters[character];
        const canvas = document.createElement('canvas');
        canvas.width = 80;
        canvas.height = 80;
        btn.appendChild(canvas);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setSize(80, 80);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        camera.position.z = 3;

        const loader = new GLTFLoader();
        loader.load(
            `https://gateway.pinata.cloud/ipfs/${cid}`,
            (gltf) => {
                const model = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 2 / maxDim;
                model.scale.setScalar(scale);
                model.position.sub(center.multiplyScalar(scale));

                scene.add(model);

                function animate() {
                    requestAnimationFrame(animate);
                    model.rotation.y += 0.01;
                    renderer.render(scene, camera);
                }
                animate();
            },
            undefined,
            (error) => console.error('Error loading character:', error)
        );
    }

    function selectCharacter(character, selectedBtn, otherBtn) {
        selectedCharacter = character;
        selectedBtn.classList.add('selected');
        otherBtn.classList.remove('selected');
    }

    // Ouverture du livre
    document.getElementById('cover').addEventListener('click', () => {
        if (!bookOpen) {
            document.getElementById('book').classList.add('open');
            document.getElementById('cover').style.display = 'none';
            document.getElementById('page1').classList.add('active');
            document.getElementById('navigation').style.display = 'flex';
            bookOpen = true;
            renderPanels();
        }
    });

    // Rendu des cases de BD
    function renderPanels() {
        const container = document.getElementById('panels');
        container.innerHTML = '';

        panels.forEach((panel, index) => {
            const panelDiv = document.createElement('div');
            panelDiv.className = 'comic-panel';
            panelDiv.innerHTML = `<div class="panel-number">${index + 1}</div>`;

            if (panel.type === 'image') {
                const img = document.createElement('img');
                img.src = panel.url;
                img.alt = `Case ${index + 1}`;
                panelDiv.appendChild(img);
                
                panelDiv.addEventListener('click', () => {
                    showFullscreen('image', panel.url);
                });
            } 
            else if (panel.type === 'video') {
                const video = document.createElement('video');
                video.src = panel.url;
                video.loop = true;
                video.muted = true;
                video.playsInline = true;
                video.autoplay = true;
                panelDiv.appendChild(video);
                
                panelDiv.addEventListener('click', () => {
                    showFullscreen('video', panel.url);
                });
            } 
            else if (panel.type === 'glb') {
                const canvas = document.createElement('canvas');
                panelDiv.appendChild(canvas);
                
                const loading = document.createElement('div');
                loading.className = 'loading';
                loading.innerHTML = '<div class="spinner"></div>Chargement 3D...';
                panelDiv.appendChild(loading);
                
                load3DModel(canvas, panel.cid, loading);
                
                panelDiv.addEventListener('click', () => {
                    showFullscreen('glb', panel.cid);
                });
            }

            container.appendChild(panelDiv);
        });
    }

    // Chargement modèle 3D
    function load3DModel(canvas, cid, loadingElement) {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        
        const size = canvas.parentElement.offsetWidth;
        renderer.setSize(size, size);
        camera.aspect = 1;
        camera.updateProjectionMatrix();

        scene.background = new THREE.Color(0x000000);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        camera.position.z = 5;

        const loader = new GLTFLoader();
        loader.load(
            `https://gateway.pinata.cloud/ipfs/${cid}`,
            (gltf) => {
                const model = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 3 / maxDim;
                model.scale.setScalar(scale);
                model.position.sub(center.multiplyScalar(scale));

                scene.add(model);
                loadingElement.style.display = 'none';

                function animate() {
                    requestAnimationFrame(animate);
                    model.rotation.y += 0.005;
                    renderer.render(scene, camera);
                }
                animate();
            },
            (progress) => {
                const percent = (progress.loaded / progress.total * 100).toFixed(0);
                loadingElement.querySelector('.loading').innerHTML = 
                    `<div class="spinner"></div>Chargement ${percent}%`;
            },
            (error) => {
                console.error('Error loading GLB:', error);
                loadingElement.innerHTML = 'Erreur de chargement';
            }
        );
    }

    // Affichage plein écran
    function showFullscreen(type, source) {
        const viewer = document.getElementById('fullscreenViewer');
        const content = document.getElementById('fullscreenContent');
        content.innerHTML = '';

        if (type === 'image') {
            const img = document.createElement('img');
            img.src = source;
            content.appendChild(img);
        } 
        else if (type === 'video') {
            const video = document.createElement('video');
            video.src = source;
            video.controls = true;
            video.autoplay = true;
            video.playsInline = true;
            content.appendChild(video);
        } 
        else if (type === 'glb') {
            const canvas = document.createElement('canvas');
            content.appendChild(canvas);
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            
            renderer.setSize(window.innerWidth * 0.9, window.innerHeight * 0.9);
            scene.background = new THREE.Color(0x000000);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            camera.position.z = 5;

            const controls = new OrbitControls(camera, canvas);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const loader = new GLTFLoader();
            loader.load(
                `https://gateway.pinata.cloud/ipfs/${source}`,
                (gltf) => {
                    const model = gltf.scene;
                    
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 4 / maxDim;
                    model.scale.setScalar(scale);
                    model.position.sub(center.multiplyScalar(scale));

                    scene.add(model);

                    function animate() {
                        requestAnimationFrame(animate);
                        controls.update();
                        renderer.render(scene, camera);
                    }
                    animate();
                }
            );
        }

        viewer.classList.add('active');
    }

    // Fermeture plein écran
    document.getElementById('closeBtn').addEventListener('click', () => {
        document.getElementById('fullscreenViewer').classList.remove('active');
        document.getElementById('fullscreenContent').innerHTML = '';
    });

    // Clic en dehors pour fermer
    document.getElementById('fullscreenViewer').addEventListener('click', (e) => {
        if (e.target.id === 'fullscreenViewer') {
            document.getElementById('fullscreenViewer').classList.remove('active');
            document.getElementById('fullscreenContent').innerHTML = '';
        }
    });

    // Initialisation
    createParticles();
    setupCharacterSelection();
</script>
